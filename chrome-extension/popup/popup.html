<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatLink</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      font-size: 20px;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .subtitle {
      font-size: 11px;
      color: #64748b;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #6b7280; }

    .status-text {
      font-size: 12px;
      color: #94a3b8;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .tab-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #1e293b;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .tab-item:hover {
      background: #273549;
    }

    .platform-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: #334155;
      color: #94a3b8;
      flex-shrink: 0;
    }

    .tab-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #cbd5e1;
    }

    .active-indicator {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .empty-state {
      color: #475569;
      font-size: 12px;
      text-align: center;
      padding: 12px 0;
    }

    .instructions {
      padding: 12px 16px;
    }

    .instruction-title {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .code-block {
      background: #1e293b;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: #7dd3fc;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .hint {
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
    }

    button.refresh {
      margin-top: 8px;
      width: 100%;
      padding: 7px;
      background: #1e40af;
      color: #bfdbfe;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.refresh:hover { background: #1d4ed8; }

    button.reconnect {
      margin-top: 8px;
      width: 100%;
      padding: 7px;
      background: #166534;
      color: #bbf7d0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.reconnect:hover { background: #15803d; }
    button.reconnect:disabled { background: #1e293b; color: #475569; cursor: default; }

    .coffee-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      background: #1e293b;
      color: #94a3b8;
      font-size: 11px;
      text-decoration: none;
      border-top: 1px solid #1e293b;
      transition: background 0.15s, color 0.15s;
    }

    .coffee-link:hover {
      background: #273549;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🔗</span>
    <div>
      <div class="title">ChatLink</div>
      <div class="subtitle">AI context bridge for Claude Code</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">Checking connection…</span>
    <button class="reconnect" id="reconnectBtn" style="width:auto;margin:0;padding:4px 10px;font-size:11px;" disabled>Reconnect</button>
  </div>

  <div class="section">
    <div class="section-title">Open AI Chat Tabs</div>
    <div class="tab-list" id="tabList">
      <div class="empty-state">Loading…</div>
    </div>
    <button class="refresh" id="refreshBtn">Refresh</button>
  </div>

  <div class="instructions">
    <div class="instruction-title">Usage in Claude Code</div>
    <div class="code-block">list_ai_tabs</div>
    <div class="code-block">get_chat_context</div>
    <div class="hint">Ask Claude Code: "pull context from my browser tabs" and it will use these tools automatically.</div>
  </div>

  <a class="coffee-link" href="https://buymeacoffee.com/indiantinker" target="_blank" rel="noopener noreferrer">
    ☕ Buy me a coffee
  </a>

  <a class="coffee-link" href="#" id="diagLink">
    🔧 Diagnostics
  </a>

  <script src="popup.js"></script>
</body>
</html>
